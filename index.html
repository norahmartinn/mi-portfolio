  * { box-sizing: border-box; }

  .h-flow    { display: inline-block; transition: transform 0.4s cubic-bezier(.2,.7,.3,1); }

  @keyframes fadeIn  { from {opacity: 0} to {opacity: 1} }
  @keyframes slideUp { from {opacity:0; transform:translateY(24px)} to {opacity:1; transform:translateY(0)} }

// ─── Reveal on scroll ──────────────────────────────────────────────────
function Reveal({ children, delay = 0, y = 24 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) setVisible(true); }),
      { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
    );
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return (
    <div
      ref={ref}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? 'translateY(0)' : `translateY(${y}px)`,
        transition: `opacity 0.9s cubic-bezier(.2,.7,.3,1) ${delay}ms, transform 0.9s cubic-bezier(.2,.7,.3,1) ${delay}ms`,
        willChange: 'opacity, transform',
      }}
    >
      {children}
    </div>
  );
}

// ─── Reactive letter (hero) ────────────────────────────────────────────
function ReactiveLetter({ char, mouse, containerRef }) {
  const ref = useRef(null);
  const [tx, setTx] = useState({ x: 0, y: 0, r: 0, s: 1 });

  useEffect(() => {
    if (!ref.current || !containerRef.current) return;
    const el = ref.current.getBoundingClientRect();
    const container = containerRef.current.getBoundingClientRect();
    const cx = el.left - container.left + el.width / 2;
    const cy = el.top - container.top + el.height / 2;
    const dx = mouse.x - cx;
    const dy = mouse.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const radius = 200;
    if (dist < radius && mouse.active) {
      const force = (1 - dist / radius) ** 2;
      setTx({
        x: -(dx/dist) * force * 22,
        y: -(dy/dist) * force * 22,
        r:  (dx/dist) * force * 8,
        s: 1 + force * 0.12,
      });
    } else {
      setTx({ x: 0, y: 0, r: 0, s: 1 });
    }
  }, [mouse.x, mouse.y, mouse.active]);

  return (
    <span ref={ref} data-reactive-letter="true" style={{
      display: 'inline-block',
      transform: `translate(${tx.x}px, ${tx.y}px) rotate(${tx.r}deg) scale(${tx.s})`,
      transition: 'transform .28s cubic-bezier(.2,.7,.3,1)',
      whiteSpace: 'pre',
    }}>
      {char}
    </span>
  );
}

function Letters({ text, letterClass = '', letterStyle = () => ({}) }) {
  return (
    <>
      {text.split('').map((c, i) => (
        <span key={i} className={letterClass}
              style={{ display: 'inline-block', whiteSpace: 'pre', ...letterStyle(i) }}>
          {c === ' ' ? '\u00A0' : c}
        </span>
      ))}
    </>
  );
}

    const t = setTimeout(() => setMounted(true), 80);

      const r = wrapRef.current?.getBoundingClientRect();
      if (!r) return;
      setMouse({ x: e.clientX - r.left, y: e.clientY - r.top, active: true });
    };
    const onLeave = () => setMouse((m) => ({ ...m, active: false }));
    const el = wrapRef.current;
    el?.addEventListener('mousemove', onMove);
    el?.addEventListener('mouseleave', onLeave);

// ─── Carousel ──────────────────────────────────────────────────────────
function ProjectCarousel({ images }) {
  const [idx, setIdx] = useState(0);
  const total = images?.length || 0;

  // Keyboard arrow navigation while modal/carousel is mounted
  useEffect(() => {
    if (total <= 1) return;
    const onKey = (e) => {
      if (e.key === 'ArrowLeft')  setIdx((i) => (i - 1 + total) % total);
      if (e.key === 'ArrowRight') setIdx((i) => (i + 1) % total);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [total]);

  if (!images || images.length === 0) return null;

  const next = () => setIdx((i) => (i + 1) % total);
  const prev = () => setIdx((i) => (i - 1 + total) % total);

  const arrowStyle = {
    position: 'absolute', top: '50%',
    transform: 'translateY(-50%)',
    width: 44, height: 44,
    border: '1px solid var(--fg-faint)',
    background: 'rgba(15,28,80,0.72)',
    backdropFilter: 'blur(8px)',
    WebkitBackdropFilter: 'blur(8px)',
    color: 'var(--fg)', fontFamily: 'var(--sans)', fontSize: 20,
    fontWeight: 500, cursor: 'pointer',
    transition: 'background 0.2s, color 0.2s',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    lineHeight: 1, padding: 0,
  };

  return (
    <div data-carousel="true" style={{ margin: '0 0 48px' }}>
      {/* Header line: counter + dots */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 14, gap: 16, flexWrap: 'wrap',
      }}>
        <div style={{
          fontFamily: 'var(--sans)', fontSize: 11, fontWeight: 600,
          color: 'var(--fg-dim)', letterSpacing: '0.12em',
          textTransform: 'uppercase',
        }}>
          [galería] · <span style={{ color: 'var(--accent)' }}>{String(idx + 1).padStart(2,'0')}</span>
          <span style={{ opacity: 0.55 }}> / {String(total).padStart(2,'0')}</span>
        </div>
        {total > 1 && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {images.map((_, i) => (
              <button
                key={i}
                onClick={() => setIdx(i)}
                aria-label={`Ir a imagen ${i + 1}`}
                style={{
                  width: idx === i ? 22 : 8, height: 4,
                  background: idx === i ? 'var(--accent)' : 'var(--fg-faint)',
                  border: 'none', padding: 0, cursor: 'pointer',
                  transition: 'all 0.35s cubic-bezier(.2,.7,.3,1)',
                }}
              />
            ))}
          </div>
        )}
      </div>

      {/* Image frame */}
      <div data-carousel-frame="true" style={{
        position: 'relative',
        width: '100%',
        aspectRatio: '2 / 1',
        background: 'rgba(0,0,0,0.22)',
        border: '1px solid var(--fg-faint)',
        overflow: 'hidden',
      }}>
        {images.map((img, i) => (
          <img
            key={i}
            src={img.src}
            alt={img.caption}
            loading="lazy"
            draggable={false}
            style={{
              position: 'absolute',
              inset: 0,
              width: '100%', height: '100%',
              objectFit: 'contain',
              opacity: idx === i ? 1 : 0,
              transition: 'opacity 0.55s cubic-bezier(.2,.7,.3,1)',
              pointerEvents: idx === i ? 'auto' : 'none',
            }}
          />
        ))}

        {total > 1 && (
          <>
            <button
              onClick={prev}
              aria-label="Anterior"
              style={{ ...arrowStyle, left: 16 }}
              onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--accent)'; e.currentTarget.style.color = 'var(--bg)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = 'rgba(15,28,80,0.72)'; e.currentTarget.style.color = 'var(--fg)'; }}
            >←</button>
            <button
              onClick={next}
              aria-label="Siguiente"
              style={{ ...arrowStyle, right: 16 }}
              onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--accent)'; e.currentTarget.style.color = 'var(--bg)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = 'rgba(15,28,80,0.72)'; e.currentTarget.style.color = 'var(--fg)'; }}
            >→</button>
          </>
        )}
      </div>

      {/* Caption */}
      <p style={{
        fontFamily: 'var(--display)', fontStyle: 'italic',
        fontSize: 15, color: 'var(--fg-dim)',
        margin: '14px 0 0', lineHeight: 1.45,
        minHeight: '2.6em',
      }}>
        {images[idx].caption}
      </p>
    </div>
  );
}

// ─── Contact ───────────────────────────────────────────────────────────
function ContactCTA() {
  const [copied, setCopied] = useState(false);
  const onClick = (e) => {
    e.preventDefault();
    navigator.clipboard?.writeText(NORAH.email);
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
    window.location.href = 'mailto:' + NORAH.email;
  };
  return (
    <section data-contact="true" style={{ padding: '96px 64px 96px' }}>
      <div data-contact-inner="true" style={{
        display: 'flex',
        alignItems: 'flex-end',
        justifyContent: 'space-between',
        gap: 48, flexWrap: 'wrap',
      }}>
        <Reveal delay={100}>
          <div style={{ minWidth: 0 }}>
            <a
              href={`mailto:${NORAH.email}`}
              onClick={onClick}
              data-contact-cta="true"
              style={{
                fontFamily: 'var(--display)', fontStyle: 'italic',
                fontSize: 'clamp(64px, 12vw, 180px)',
                fontWeight: 400, letterSpacing: '-0.045em',
                lineHeight: 0.95, color: 'var(--fg)',
                textDecoration: 'none', display: 'inline-block',
                cursor: 'pointer',
              }}>
              → Hablemos<span style={{ fontStyle: 'normal', color: 'var(--accent)' }}>.</span>
            </a>

            <div data-contact-label="true" style={{
              marginTop: 28,
              fontFamily: 'var(--sans)', fontSize: 12,
              fontWeight: 600,
              color: 'var(--accent)', letterSpacing: '0.14em',
              textTransform: 'uppercase',
            }}>
              [escríbeme a]
            </div>

            <div style={{
              marginTop: 8, display: 'flex',
              alignItems: 'baseline', gap: 18,
            }}>
              <a
                href={`mailto:${NORAH.email}`}
                onClick={onClick}
                data-contact-email="true"
                style={{
                  fontFamily: 'var(--display)', fontStyle: 'italic',
                  fontSize: 22, color: 'var(--fg)',
                  textDecoration: 'none',
                  borderBottom: '1px solid var(--fg-faint)',
                  paddingBottom: 4,
                  letterSpacing: '-0.005em',
                }}>
                {NORAH.email}
              </a>
              {copied && (
                <span style={{
                  fontFamily: 'var(--sans)', fontSize: 11,
                  fontWeight: 600,
                  color: 'var(--accent)', letterSpacing: '0.05em',
                }}>
                  [copiado]
                </span>
              )}
            </div>
          </div>
        </Reveal>

        <Reveal delay={200}>
          <div style={{
            display: 'flex', flexDirection: 'column',
            gap: 14, alignItems: 'flex-start',
            paddingBottom: 12,
          }}>
            <a href={NORAH.linkedin} target="_blank" rel="noreferrer"
               aria-label="LinkedIn" style={iconLinkStyle}>
              <LinkedInIcon size={22} />
              <span style={iconLabelStyle}>[LinkedIn]</span>
            </a>
            <a href={NORAH.github} target="_blank" rel="noreferrer"
               aria-label="GitHub" style={iconLinkStyle}>
              <GitHubIcon size={22} />
              <span style={iconLabelStyle}>[GitHub]</span>
            </a>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

const iconLinkStyle = {
  color: 'var(--fg)',
  display: 'inline-flex',
  alignItems: 'center',
  gap: 10,
  opacity: 0.9,
  transition: 'opacity .2s, color .2s, transform .2s',
  textDecoration: 'none',
};
const iconLabelStyle = {
  fontFamily: 'var(--sans)',
  fontWeight: 600,
  fontSize: 13,
  letterSpacing: '0.04em',
  color: 'var(--fg)',
};

// ─── Footer ────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer data-footer="true" style={{ padding: '32px 64px 40px' }}>
      <div style={{ height: 1, background: 'var(--fg-faint)', marginBottom: 24 }} />
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        fontFamily: 'var(--sans)', fontSize: 11,
        fontWeight: 600,
        color: 'var(--fg-dim)', letterSpacing: '0.06em',
      }}>
        <span data-footer-brand="true" style={{
          fontFamily: 'var(--display)', fontStyle: 'italic',
          fontSize: 18, color: 'var(--fg)', letterSpacing: '-0.015em',
        }}>
          norah<span style={{ color: 'var(--accent)' }}>.</span>
        </span>
        <span>[© 2026]</span>
      </div>
    </footer>
  );
}

// ─── App ───────────────────────────────────────────────────────────────
function App() {
  const [openProject, setOpenProject] = useState(null);
  return (
    <>
      <Hero onOpen={setOpenProject} />
      <ContactCTA />
      <Footer />
      {openProject && <ProjectModal project={openProject} onClose={() => setOpenProject(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
